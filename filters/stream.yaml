# Stream: operational tool notification volume.
#
# Catches ALL mail from tools you actively work in — comments, @mentions,
# task assignments, PR notifications, changelogs, digests, everything.
#
# Rationale: this is a personal inbox, not a work inbox. The cost of a few-hour
# delay on a GitHub PR comment is lower than the cost of 30 comment notifications
# cluttering the inbox permanently. Gemini Flow handles the truly urgent items
# that slip through other filters as human correspondence.
#
# Domain-only filter: no keyword gate. Everything from these tool domains
# routes to Stream regardless of content.
#
# AI contract: Gemini Flow only reads the raw inbox. Stream is a feed you
# check on your own schedule — once a day or as needed.

label: Stream
archive: true

from_domains:
  # Code & Dev
  - github.com
  - gitlab.com
  - bitbucket.org
  - vercel.com
  - netlify.com
  - render.com
  # Project & Task Management
  - linear.app
  - asana.com
  - clickup.com
  - monday.com
  - trello.com
  - basecamp.com
  # Design & Docs
  - figma.com
  - canva.com
  - notion.so
  - miro.com
  - airtable.com
  # Collaboration & Comms
  - slack.com
  - zoom.us
  - loom.com
  - calendly.com
  # CRM & Sales
  - salesforce.com
  - hubspot.com
  # Cloud & Infra
  - aws.amazon.com
  - cloud.google.com
  - azure.com

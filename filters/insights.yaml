# Insights: pure editorial — newsletters, research, and industry media.
#
# IMPORTANT: Only domains that send EXCLUSIVELY newsletter/editorial content
# belong here. Operational tools (GitHub, Slack, Zoom, Notion, Figma, Linear,
# Asana, ClickUp, Monday, Salesforce) are intentionally excluded — they send
# task assignments, PR reviews, meeting invites, and direct messages that require
# action and must reach the inbox.
#
# Rule of thumb: if the sender could send you something that blocks someone else,
# it does not belong in Insights.

label: Insights
archive: true

from_domains:
  # AI & Tech news
  - openai.com
  - producthunt.com
  - techcrunch.com
  - venturebeat.com
  - wired.com
  - fastcompany.com
  - techtarget.com
  # Business & Strategy research
  - hbr.org
  - mckinsey.com
  - gartner.com
  - cbinsights.com
  - crunchbase.com
  - insider.com
  # Marketing & Growth newsletters
  - marketingbrew.com
  - digiday.com
  - adweek.com
  - semrush.com
  # Long-form & independent publishing
  - medium.com

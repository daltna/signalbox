# Careers: job boards, ATS systems, certifications, recruiter outreach.
# Both domain + keyword required — LinkedIn/Indeed send transactional mail too
# (connection requests, profile views) that should NOT be routed here.

label: Careers
archive: true

from_domains:
  - welcometothejungle.com
  - linkedin.com
  - indeed.com
  - ziprecruiter.com
  - glassdoor.com
  - monster.com
  - workday.com
  - greenhouse.io
  - lever.co
  - taleo.net
  - handshake.com
  - simplyhired.com
  - theinstitutes.org

has_words:
  - "job alert"
  - "new job"
  - "recommended jobs"
  - "matches your search"
  - "certification"
  - "credential"
  - "exam score"
  - "continuing education"
  - "application received"
  - "viewed your resume"
  - "application update"
  - "recruiter is interested"
  - "job opening"

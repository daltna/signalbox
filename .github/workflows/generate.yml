name: Validate mailFilters.xml

on:
  push:
    paths:
      - "filters/**"
      - "generate.py"
      - "mailFilters.xml"
  pull_request:
    paths:
      - "filters/**"
      - "generate.py"
      - "mailFilters.xml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Regenerate mailFilters.xml
        run: python generate.py

      - name: Confirm output is valid XML
        run: python -c "import xml.etree.ElementTree as ET; ET.parse('mailFilters.xml'); print('Valid XML')"

      - name: Confirm committed XML matches generated XML
        run: |
          git diff --exit-code mailFilters.xml || {
            echo ""
            echo "ERROR: mailFilters.xml is out of sync with the YAML filters."
            echo "Run 'python generate.py' locally and commit the result."
            exit 1
          }
